defaults:
  - /habitat_baselines: habitat_baselines_rl_config_base
  - /benchmark/nav/objectnav: objectnav_mp3d
  - /habitat/task/lab_sensors:
      - base_explorer
      - compass_sensor
      - gps_sensor
      - heading_sensor
      - frontier_sensor
  - /habitat/task/measurements:
    - multi_floor_map # frontier_exploration_map
    - traveled_stairs
  - /habitat_baselines/rl/policy: ascent_policy
  - _self_

habitat:
  simulator:
    habitat_sim_v0:
      gpu_device_id: 0
  environment:
    iterator_options:
      max_scene_repeat_steps: 50000
      shuffle: False
  task:
    success_reward: 2.5
    slack_reward: -1e-3
    lab_sensors:
      base_explorer:
        turn_angle: 30
        area_thresh: 1.5

habitat_baselines:
  evaluate: True
  eval_ckpt_path_dir: dummy_policy.pth
  num_environments: 1
  load_resume_state_config: False
  verbose: false
  torch_gpu_id: 0
  tensorboard_dir: "debug/tb_mp3d_cross_floor"
  video_dir: "debug/video_mp3d_cross_floor"
  test_episode_count: -1
  checkpoint_folder: "debug/"
  trainer_name: "ascent"
  num_updates: 270000
  log_interval: 10
  num_checkpoints: 100
  force_torch_single_threaded: True
  eval_keys_to_include_in_name: ["success","spl","num_steps"]
  eval:
    split: "val_cross_floor"
    video_option: []
  rl:
    policy:
      main_agent:
        name: "Ascent_Policy"
        nearby_distance: 3.0 
        topk: 3 
        action_distribution_type: categorical
        obstacle_map_area_threshold: 1.5 
        pointnav_policy_path: "third_party/vlfm/data/pointnav_weights.pth"
    ppo:
      clip_param: 0.2
      ppo_epoch: 2
      num_mini_batch: 2
      value_loss_coef: 0.5
      entropy_coef: 0.01
      lr: 2.5e-4
      eps: 1e-5
      max_grad_norm: 0.2
      num_steps: 128
      use_gae: True
      gamma: 0.99
      tau: 0.95
      use_linear_clip_decay: False
      use_linear_lr_decay: False
      reward_window_size: 50

      use_normalized_advantage: False

      hidden_size: 512
    ddppo:
      sync_frac: 0.6
      distrib_backend: NCCL
      pretrained_weights: data/ddppo-models/gibson-2plus-resnet50.pth
      pretrained: False
      pretrained_encoder: False
      train_encoder: True
      reset_critic: False

      backbone: resnet18
      rnn_type: LSTM
      num_recurrent_layers: 2
